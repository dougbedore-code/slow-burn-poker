                <p style={{ marginBottom: 4 }}><span style={{ fontWeight: 600, color: "#e74c3c" }}>Act 2 (L4-6):</span> CPU trades mid-range cards for null-suit power cards. Mystery hands unlock!</p>
                <p style={{ marginBottom: 12 }}><span style={{ fontWeight: 600, color: "#9b59b6" }}>Act 3 (L7-10):</span> CPU trades face cards. Level 10 is the Boss — a 32-card deck of null A/K/Q/J.</p>
                <div style={{ fontWeight: 700, color: "#f1c40f", fontSize: 14, marginBottom: 4 }}>Null-Suit Cards (∅)</div>
                <p style={{ marginBottom: 12 }}>Brown cards with ∅ symbol. They can make pairs, trips, quads, and straights — but NOT flushes or straight flushes.</p>
                <div style={{ fontWeight: 700, color: "#f1c40f", fontSize: 14, marginBottom: 4 }}>Coins & The Store</div>
                <p style={{ marginBottom: 12 }}>Win rounds to earn coins (1 per win, +2 bonus for sweeping all 3 rounds). Between sessions, spend on Score Multipliers, Rank Upgrades, or Card Swaps.</p>
              </div>
            </div>
          </div>
        )}

        {/* ═══════ START SCREEN ═══════ */}
        {phase === PHASES.START && (
          <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 20, zIndex: 1 }}>
            <div style={{ fontSize: 36, fontWeight: 700, fontFamily: "'Georgia', serif", background: "linear-gradient(180deg, #f5d998 0%, #c9973b 100%)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>SLOW BURN POKER</div>
            <div style={{ fontSize: 14, opacity: 0.6, maxWidth: 380, textAlign: "center", lineHeight: 1.6 }}>
              10 levels. 3 acts. Your deck carries forward. Beat the CPU across all levels to win.
            </div>
            <div style={{ fontSize: 11, opacity: 0.4, maxWidth: 320, textAlign: "center", lineHeight: 1.5 }}>
              Act 1: Standard decks · Act 2: CPU trades begin · Act 3: Face the Boss
            </div>
            <button onClick={() => startGame()} onTouchEnd={(e) => { e.preventDefault(); startGame(); }} style={btn("#27ae60", "#2ecc71")}>Begin Level 1</button>
          </div>
        )}

        {/* ═══════ GAME OVER ═══════ */}
        {phase === PHASES.GAME_OVER && (
          <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 12, zIndex: 1 }}>
            <div style={{ fontSize: 36, fontWeight: 700, fontFamily: "'Georgia', serif", color: "#e74c3c" }}>DEFEAT</div>
            <div style={{ fontSize: 42, fontWeight: 700, marginTop: 4, color: bankScore < 0 ? "#e74c3c" : "#f1c40f" }}>
              {bankScore > 0 ? "+" : ""}{bankScore}
            </div>
            <div style={{ fontSize: 14, opacity: 0.6 }}>
              Level {level} — needed {LEVEL_CONFIG[level].winScore > 0 ? `>${LEVEL_CONFIG[level].winScore}` : ">0"} to advance
            </div>
            <div style={{ fontSize: 12, opacity: 0.4, marginTop: 4 }}>
              {LEVEL_CONFIG[level].lossTarget === "start"
                ? "Act 1 defeat — back to Level 1"
                : `Rolling back to Level ${LEVEL_CONFIG[level].lossTarget} checkpoint`}
            </div>
            <button onClick={() => {
              if (LEVEL_CONFIG[level].lossTarget === "start") {
                setPhase(PHASES.START);
              } else {
                // Rollback already applied in nextRound — just start the checkpoint level
                initSession(0, true);
              }
            }} onTouchEnd={(e) => {
              e.preventDefault();
              if (LEVEL_CONFIG[level].lossTarget === "start") {
                setPhase(PHASES.START);
              } else {
                initSession(0, true);
              }
            }} style={btn("#e67e22", "#f39c12")}>
              {LEVEL_CONFIG[level].lossTarget === "start" ? "Start Over" : `Retry from Level ${LEVEL_CONFIG[level].lossTarget}`}
            </button>
          </div>
        )}

        {/* ═══════ LEVEL COMPLETE ═══════ */}
        {phase === PHASES.LEVEL_COMPLETE && (
          <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16, zIndex: 1, padding: "0 20px" }}>
            <div style={{ fontSize: 12, letterSpacing: 2, textTransform: "uppercase", opacity: 0.5 }}>
              Level {level} — {LEVEL_CONFIG[level].label}
            </div>
            <div style={{ fontSize: 36, fontWeight: 700, fontFamily: "'Georgia', serif", color: "#2ecc71" }}>LEVEL COMPLETE!</div>
            <div style={{ fontSize: 42, fontWeight: 700, color: "#2ecc71" }}>+{bankScore}</div>
            <div style={{ fontSize: 14, opacity: 0.6 }}>Final Score Bank</div>
            {level < 10 && (
              <div style={{ background: "rgba(0,0,0,0.2)", borderRadius: 12, padding: "16px 20px", border: "1px solid rgba(46,204,113,0.3)", maxWidth: 400, lineHeight: 1.7, fontSize: 13 }}>
                <div style={{ fontWeight: 700, color: "#2ecc71", marginBottom: 8 }}>Level {level + 1}: {LEVEL_CONFIG[level + 1].label}</div>
                {level === 3 && <div style={{ marginBottom: 4 }}>• <span style={{ color: "#9b59b6", fontWeight: 600 }}>Mystery hands</span> are now in play! Discover special 7-card combinations.</div>}
                {level === 3 && <div style={{ marginBottom: 4 }}>• Round 3 now uses <span style={{ color: "#2ecc71", fontWeight: 600 }}>all 7 cards</span>.</div>}
                {level === 3 && <div style={{ marginBottom: 4 }}>• <span style={{ color: "#f1c40f", fontWeight: 600 }}>Win streaks</span> earn bonus score multipliers.</div>}
                {CPU_TRADES[level + 1] && <div style={{ marginBottom: 4 }}>• CPU trades some cards for <span style={{ color: "#8B5E3C", fontWeight: 600 }}>null-suit (∅) power cards</span>.</div>}
                {level + 1 === 10 && <div style={{ marginBottom: 4 }}>• <span style={{ color: "#e74c3c", fontWeight: 600 }}>THE BOSS</span>: CPU has a 32-card deck of null A/K/Q/J!</div>}
                {(level + 1 >= 4 && level + 1 <= 6) && <div style={{ fontSize: 11, opacity: 0.5, marginTop: 6 }}>Checkpoint at Level 4 — defeat rolls back here.</div>}
                {(level + 1 >= 7) && <div style={{ fontSize: 11, opacity: 0.5, marginTop: 6 }}>Checkpoint at Level 7 — defeat rolls back here.</div>}
              </div>
            )}
            <button onClick={() => { setLevelStoreMode(true); setPhase(PHASES.STORE); }} onTouchEnd={(e) => { e.preventDefault(); setLevelStoreMode(true); setPhase(PHASES.STORE); }} style={btn("#27ae60", "#2ecc71")}>
              Visit Store Before Level {level + 1} →
            </button>
          </div>
        )}

        {/* ═══════ LEVEL REWARD (after L3 and L6) ═══════ */}
        {phase === PHASES.LEVEL_REWARD && (
          <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16, zIndex: 1 }}>
            <div style={{ fontSize: 12, letterSpacing: 2, textTransform: "uppercase", opacity: 0.5 }}>
              {level === 3 ? "Act 1 Complete!" : "Act 2 Complete!"}
            </div>
            <div style={{ fontSize: 36, fontWeight: 700, fontFamily: "'Georgia', serif", background: "linear-gradient(180deg, #f5d998 0%, #c9973b 100%)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
              MILESTONE REACHED!
            </div>
            <div style={{ fontSize: 60, marginTop: 8 }}>{"\uD83C\uDFC6"}</div>
            <div style={{ fontSize: 20, fontWeight: 700, color: "#f1c40f" }}>+200 Bonus Coins!</div>
            <div style={{ fontSize: 14, opacity: 0.5 }}>
              {level === 3 ? "You've mastered the standard game. The real challenge begins..." : "You've survived the CPU's mid-range trades. Face cards are next..."}

            <button onClick={() => { setLevelStoreMode(true); setPhase(PHASES.STORE); }} onTouchEnd={(e) => { e.preventDefault(); setLevelStoreMode(true); setPhase(PHASES.STORE); }} style={btn("#9b59b6", "#bb8fce")}>
              Visit Store Before {level === 3 ? "Act 2" : "Act 3"} →
            </button>
          </div>
        )}

        {/* ═══════ VICTORY ═══════ */}
        {phase === PHASES.VICTORY && (
          <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16, zIndex: 1 }}>
            <div style={{ fontSize: 42, fontWeight: 700, fontFamily: "'Georgia', serif", background: "linear-gradient(180deg, #f5d998 0%, #f1c40f 100%)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
              ULTIMATE VICTORY!
            </div>
            <div style={{ fontSize: 80 }}>{"\uD83D\uDC51"}</div>
            <div style={{ fontSize: 16, opacity: 0.7, maxWidth: 340, textAlign: "center", lineHeight: 1.6 }}>
              You defeated the Boss and conquered all 10 levels of Slow Burn Poker!
            </div>
            <button onClick={() => setPhase(PHASES.START)} onTouchEnd={(e) => { e.preventDefault(); setPhase(PHASES.START); }} style={btn("#f1c40f", "#f39c12")}>Play Again</button>
          </div>

        {/* ═══════ SESSION COMPLETE ═══════ */}
        {phase === PHASES.SESSION_COMPLETE && (
          <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16, zIndex: 1 }}>

            </div>
            <div style={{ fontSize: 30, fontWeight: 700, fontFamily: "'Georgia', serif", background: "linear-gradient(180deg, #f5d998 0%, #c9973b 100%)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>SESSION COMPLETE</div>
            <div style={{ marginTop: 8, textAlign: "center" }}>
              <div style={{ fontSize: 9, letterSpacing: 1.5, textTransform: "uppercase", opacity: 0.5 }}>Score Bank</div>
              <div style={{ fontSize: 42, fontWeight: 700, color: bankScore > 0 ? "#2ecc71" : bankScore < 0 ? "#e74c3c" : "#f1c40f" }}>

              </div>
            </div>
            <div style={{ fontSize: 13, opacity: 0.5 }}>

            </div>
            {roundResults.length === 3 && roundResults.every(r => r.winner === "player") && (
              <div style={{ marginTop: 4, padding: "8px 16px", borderRadius: 10, background: "rgba(241,196,15,0.15)", border: "1px solid rgba(241,196,15,0.3)", textAlign: "center" }}>

              </div>
            )}
            <div style={{ marginTop: 8, fontSize: 15, fontWeight: 700, color: "#f1c40f" }}>
              {"\uD83E\uDE99"} {coins} coin{coins !== 1 ? "s" : ""} to spend
            </div>
            <button onClick={() => setPhase(PHASES.STORE)} onTouchEnd={(e) => { e.preventDefault(); setPhase(PHASES.STORE); }} style={btn("#e67e22", "#f39c12")}>
              Visit the Store →
            </button>
          </div>
        )}

        {/* ═══════ STORE ═══════ */}
        {phase === PHASES.STORE && (() => {
          const suitSymbols = { spades: "\u2660", hearts: "\u2665", diamonds: "\u2666", clubs: "\u2663" };
          const suitColors = { spades: "#e0e0e0", hearts: "#e74c3c", diamonds: "#3498db", clubs: "#2ecc71" };
          let cartCost = 0;
          for (const m of MULTIPLIERS) { if (storeCart.has(`mult-${m.key}`)) cartCost += m.cost; }
          swapCardOffers.forEach((_, i) => { if (storeCart.has(`swap-${i}`)) cartCost += 1; });
          const rankHandNames = ["High Card", "Pair", "One Pair", "Flush", "Two Pair", "Straight", "Three of a Kind", "Straight Flush", "Mini Royal", "Full House", "Four of a Kind", "Str. Flush", "Royal Flush", "Five of a Kind"];
          for (const hn of rankHandNames) { if (storeCart.has(`rank-${hn}`)) cartCost += 1; }
          const afterPurchase = coins - cartCost;
          const storeItemStyle = (sel, color) => ({
            padding: "12px 14px", borderRadius: 10, width: 150, textAlign: "center",
            background: sel ? `${color}22` : "rgba(0,0,0,0.2)",
            border: sel ? `2px solid ${color}88` : "1px solid rgba(255,255,255,0.1)",
            cursor: "pointer", touchAction: "manipulation", transition: "all 0.2s",
          });
          return (
            <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 12, zIndex: 1, overflowY: "auto", WebkitOverflowScrolling: "touch", padding: "16px 0" }} data-scrollable>
              <div style={{ fontSize: 12, letterSpacing: 2, textTransform: "uppercase", opacity: 0.5 }}>
                {levelStoreMode ? `Before Level ${level + 1}` : `Before Session ${currentSession + 2} · Level ${level}`}
              </div>
              <div style={{ fontSize: 28, fontWeight: 700, fontFamily: "'Georgia', serif", background: "linear-gradient(180deg, #f5d998 0%, #c9973b 100%)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>THE STORE</div>
              <div style={{ fontSize: 15, fontWeight: 700, color: "#f1c40f" }}>
                {"\uD83E\uDE99"} {coins} coin{coins !== 1 ? "s" : ""}
              </div>

              {/* Multiplier Powers */}
              <div style={{ fontSize: 10, letterSpacing: 1.5, textTransform: "uppercase", opacity: 0.4, marginTop: 4 }}>Score Multipliers</div>
              <div style={{ fontSize: 10, opacity: 0.35, marginTop: -4, marginBottom: 4 }}>Activate on any round — applies to win or loss. One use.</div>
              <div style={{ display: "flex", gap: 10, flexWrap: "wrap", justifyContent: "center" }}>
                {MULTIPLIERS.map(m => {
                  const owned = ownedMultipliers.has(m.key);
                  const inCart = storeCart.has(`mult-${m.key}`);
                  return (
                    <div key={m.key}
                      onClick={() => !owned && toggleStoreItem(`mult-${m.key}`)}
                      onTouchEnd={(e) => { e.preventDefault(); !owned && toggleStoreItem(`mult-${m.key}`); }}
                      style={{...storeItemStyle(inCart, m.color), width: 120, ...(owned ? { opacity: 0.35, cursor: "default" } : {})}}

                      <div style={{ fontSize: 26, fontWeight: 700, color: m.color }}>{m.label}</div>

                      <div style={{ fontSize: 14, fontWeight: 700, color: "#f1c40f", marginTop: 6 }}>{m.cost} {"\uD83E\uDE99"}</div>
                      {owned && <div style={{ fontSize: 10, color: m.color, marginTop: 3, fontWeight: 600 }}>Already owned</div>}
                      {inCart && <div style={{ fontSize: 10, color: "#2ecc71", marginTop: 3, fontWeight: 600 }}>{"\u2713"} Selected</div>}
                    </div>
                  );
                })}
              </div>

              {/* Rank Value Upgrades */}
              <div style={{ fontSize: 10, letterSpacing: 1.5, textTransform: "uppercase", opacity: 0.4, marginTop: 8 }}>Rank Upgrades — 1 coin</div>
              <div style={{ fontSize: 10, opacity: 0.35, marginTop: -4, marginBottom: 4 }}>+50 score bonus when you win with this hand. Stackable.</div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "center" }}>
                {rankHandNames.map(handName => {
                  const currentBonus = rankUpgrades[handName] || 0;

                  return (
                    <div key={handName}
                      onClick={() => toggleStoreItem(`rank-${handName}`)}
                      onTouchEnd={(e) => { e.preventDefault(); toggleStoreItem(`rank-${handName}`); }}
                      style={{...storeItemStyle(inCart, "#3498db"), width: 100}}
                    >
                      <div style={{ fontSize: 11, fontWeight: 700, lineHeight: 1.2 }}>{handName}</div>
                      <div style={{ fontSize: 10, opacity: 0.6, marginTop: 3 }}>
                        {currentBonus > 0 ? `+${currentBonus} \u2192 +${currentBonus + 50}` : "+50"}
                      </div>
                      <div style={{ fontSize: 12, fontWeight: 700, color: "#f1c40f", marginTop: 4 }}>1 {"\uD83E\uDE99"}</div>
                      {currentBonus > 0 && <div style={{ fontSize: 9, color: "#3498db", marginTop: 2 }}>+{currentBonus} owned</div>}
                      {inCart && <div style={{ fontSize: 9, color: "#2ecc71", marginTop: 2, fontWeight: 600 }}>{"\u2713"} Selected</div>}
                    </div>
                  );
                })}
              </div>

              {/* Swap Cards (1 coin) */}
              <div style={{ fontSize: 10, letterSpacing: 1.5, textTransform: "uppercase", opacity: 0.4, marginTop: 8 }}>Card Upgrades — 1 coin</div>
              <div style={{ fontSize: 10, opacity: 0.35, marginTop: -4, marginBottom: 4 }}>Sacrifice a low card, get a face card in your next hand</div>
              <div style={{ display: "flex", gap: 12, flexWrap: "wrap", justifyContent: "center" }}>
                {swapCardOffers.map((sc, i) => {
                  const faceNames = { 11: "J", 12: "Q", 13: "K", 14: "A" };
                  const sel = storeCart.has(`swap-${i}`);
                  return (
                    <div key={i}
                      onClick={() => toggleStoreItem(`swap-${i}`)}
                      onTouchEnd={(e) => { e.preventDefault(); toggleStoreItem(`swap-${i}`); }}
                      style={storeItemStyle(sel, suitColors[sc.toSuit])}
                    >
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
                        <span style={{ fontSize: 18, opacity: 0.5 }}>{sc.fromValue}{suitSymbols[sc.fromSuit]}</span>
                        <span style={{ fontSize: 16, opacity: 0.4 }}>{"\u2192"}</span>
                        <span style={{ fontSize: 24, fontWeight: 700, color: suitColors[sc.toSuit] }}>{faceNames[sc.toValue]}{suitSymbols[sc.toSuit]}</span>
                      </div>
                      <div style={{ fontSize: 11, opacity: 0.6, marginTop: 4, lineHeight: 1.4 }}>
                        Trade {sc.fromValue}{suitSymbols[sc.fromSuit]} for {faceNames[sc.toValue]}{suitSymbols[sc.toSuit]}
                      </div>
                      <div style={{ fontSize: 14, fontWeight: 700, color: "#f1c40f", marginTop: 6 }}>1 {"\uD83E\uDE99"}</div>
                      {sel && <div style={{ fontSize: 10, color: "#2ecc71", marginTop: 3, fontWeight: 600 }}>✓ Selected</div>}
                    </div>
                  );
                })}
              </div>

              {/* Coins summary */}
              {cartCost > 0 && (
                <div style={{ marginTop: 8, textAlign: "center" }}>
                  <div style={{ fontSize: 12, color: "#e74c3c" }}>Cost: −{cartCost} {"\uD83E\uDE99"}</div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: afterPurchase >= 0 ? "#f1c40f" : "#e74c3c", marginTop: 2 }}>
                    Remaining: {afterPurchase} coin{afterPurchase !== 1 ? "s" : ""}
                  </div>
                  {afterPurchase < 0 && <div style={{ fontSize: 11, color: "#e74c3c", marginTop: 2 }}>Not enough coins!</div>}
                </div>
              )}

              <button
                onClick={() => { if (afterPurchase >= 0 || cartCost === 0) proceedFromStore(); }}
                onTouchEnd={(e) => { e.preventDefault(); if (afterPurchase >= 0 || cartCost === 0) proceedFromStore(); }}
                style={{...btn("#27ae60", "#2ecc71"), ...(cartCost > 0 && afterPurchase < 0 ? { opacity: 0.4, cursor: "not-allowed" } : {})}}
              >
                {levelStoreMode
                  ? (cartCost > 0 ? `Buy & Begin Level ${level + 1} →` : `Skip Store — Level ${level + 1} →`)
                  : (cartCost > 0 ? `Buy & Start Session ${currentSession + 2} →` : `Skip Store — Session ${currentSession + 2} →`)}
              </button>
            </div>
          );
        })()}

        {/* ═══════ ACTIVE GAME ═══════ */}
        {phase !== PHASES.START && phase !== PHASES.GAME_OVER && phase !== PHASES.SESSION_COMPLETE && phase !== PHASES.STORE && phase !== PHASES.LEVEL_COMPLETE && phase !== PHASES.LEVEL_REWARD && phase !== PHASES.VICTORY && (
          <div style={{ display: "flex", flexDirection: "column", position: "absolute", top: 0, left: 0, right: 0, bottom: 0, zIndex: 20, paddingTop: "2vh", paddingBottom: "1vh", padding: "2vh 16px 1vh 16px", pointerEvents: "none" }}>
            {/* Level + Session indicator */}
            <div style={{ display: "flex", justifyContent: "center", padding: "0 0 2px", flexShrink: 0 }}>
              <div style={{
                padding: "2px 12px", borderRadius: 8,
                background: "rgba(241,196,15,0.08)", border: "1px solid rgba(241,196,15,0.15)",
                fontSize: 10, letterSpacing: 1.5, textTransform: "uppercase", color: "#f1c40f", opacity: 0.7,
              }}>
                Level {level} — Session {currentSession + 1}/3
              </div>
              {LEVEL_CONFIG[level].winScore > 0 && (
                <div style={{
                  padding: "3px 14px", borderRadius: 8, marginLeft: 8,
                  background: bankScore > LEVEL_CONFIG[level].winScore ? "rgba(46,204,113,0.15)" : bankScore > LEVEL_CONFIG[level].winScore * 0.5 ? "rgba(241,196,15,0.12)" : "rgba(231,76,60,0.12)",
                  border: `1px solid ${bankScore > LEVEL_CONFIG[level].winScore ? "rgba(46,204,113,0.3)" : bankScore > LEVEL_CONFIG[level].winScore * 0.5 ? "rgba(241,196,15,0.25)" : "rgba(231,76,60,0.25)"}`,
                  fontSize: 11, fontWeight: 700, letterSpacing: 0.5,
                  color: bankScore > LEVEL_CONFIG[level].winScore ? "#2ecc71" : bankScore > LEVEL_CONFIG[level].winScore * 0.5 ? "#f1c40f" : "#e74c3c",
                }}>
                  {bankScore > 0 ? "+" : ""}{bankScore} / {LEVEL_CONFIG[level].winScore > 0 ? `>${LEVEL_CONFIG[level].winScore}` : ">0"}
                </div>
              )}
            </div>

            {/* Opponent hand */}
            <div style={{ display: "flex", justifyContent: "center", padding: "4px 0 4px", flexShrink: 0 }}>
              <div style={{ display: "flex" }}>
                {aiHand.map((card, i) => <Card key={card.id} card={card} faceDown={!showAiCards} small overlap={i > 0} index={i} deckColor="cpu" />)}
              </div>
            </div>

            {/* AI Discard indicator */}
            {(isPlay || isReveal) && aiDiscardCounts[currentRound] !== undefined && (
              <div style={{ display: "flex", justifyContent: "center", padding: "2px 0", flexShrink: 0 }}>
                <div style={{
                  padding: "3px 12px", borderRadius: 12,
                  background: aiDiscardCounts[currentRound] === 0 ? "rgba(46,204,113,0.15)" : aiDiscardCounts[currentRound] >= 2 ? "rgba(231,76,60,0.15)" : "rgba(241,196,15,0.12)",
                  border: `1px solid ${aiDiscardCounts[currentRound] === 0 ? "rgba(46,204,113,0.3)" : aiDiscardCounts[currentRound] >= 2 ? "rgba(231,76,60,0.3)" : "rgba(241,196,15,0.25)"}`,
                  fontSize: 11, fontWeight: 600,
                  color: aiDiscardCounts[currentRound] === 0 ? "#2ecc71" : aiDiscardCounts[currentRound] >= 2 ? "#e74c3c" : "#f1c40f",
                }}>
                  {aiDiscardCounts[currentRound] === 0
                    ? "Foe kept all cards"
                    : `Foe discarded ${aiDiscardCounts[currentRound]} card${aiDiscardCounts[currentRound] > 1 ? "s" : ""}`}
                </div>
              </div>
            )}

            {/* Opponent played */}
            {aiPlayed[currentRound]?.length > 0 && (
              <div style={{ display: "flex", justifyContent: "center", padding: "2px 0", flexShrink: 0 }}>
                <div style={{ display: "flex", gap: 6 }}>
                  {aiPlayed[currentRound].map(c => <Card key={c.id} card={c} faceDown={!isReveal && !showAiCards} small deckColor="cpu" />)}
                </div>
              </div>
            )}

            {/* Center: Communal — flexible area */}
            <div style={{ flex: "1 1 auto", minHeight: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-start", gap: 8, paddingTop: 8 }}>
              <div style={{
                padding: "10px 20px", borderRadius: 14,
                background: "rgba(0,0,0,0.15)", border: "1px solid rgba(255,255,255,0.06)",
                minWidth: 240, textAlign: "center",
              }}>
                <div style={{ fontSize: 10, letterSpacing: 2, textTransform: "uppercase", opacity: 0.4, marginBottom: 6 }}>The Pot</div>
                <div style={{ display: "flex", justifyContent: "center", gap: 10, minHeight: 50 }}>
                  {communalCards.length === 0 && <div style={{ opacity: 0.2, fontSize: 13, alignSelf: "center" }}>Shared cards appear here</div>}
                  {communalCards.map(c => <Card key={c.id} card={c} glowing />)}
                </div>
              </div>

              {/* Discard guidance */}
              {isDiscard && (
                <div style={{ textAlign: "center", fontSize: 11, textTransform: "uppercase", letterSpacing: 1.5, opacity: 0.8, marginTop: 4, color: "#f1c40f", position: "relative", zIndex: 30 }}>
                  Select up to {roundInfo.maxDiscard} to discard
                </div>
              )}

              {/* Round result banner */}
              {isReveal && roundResults.length > 0 && (() => {
                const r = roundResults[roundResults.length - 1];
                return (
                  <div style={{
                    padding: "6px 16px", borderRadius: 10, textAlign: "center", flexShrink: 0, alignSelf: "center",
                    background: r.winner === "player" ? "rgba(46,204,113,0.15)" : r.winner === "ai" ? "rgba(231,76,60,0.15)" : "rgba(255,255,255,0.08)",
                    border: `1px solid ${r.winner === "player" ? "rgba(46,204,113,0.3)" : r.winner === "ai" ? "rgba(231,76,60,0.3)" : "rgba(255,255,255,0.12)"}`,
                  }}>
                    <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 1 }}>
                      {r.winner === "player" ? "Round Won!" : r.winner === "ai" ? "Round Lost" : "A Tie!"}
                    </div>
                    <div style={{ fontSize: 11, opacity: 0.7 }}>
                      {r.pEval.name} vs {r.aEval.name}
                      {r.points > 0 && <span style={{ color: r.winner === "player" ? "#2ecc71" : "#e74c3c" }}> · {r.winner === "player" ? "+" : "−"}{r.points}</span>}
                      {r.bonus > 0 && <span style={{ opacity: 0.6 }}> ({r.basePoints}+{r.bonus})</span>}
                    </div>
                  </div>
                );
              })()}

              {/* Player played — inside communal area so it stays near the pot */}
              {playerPlayed[currentRound]?.length > 0 && (
                <div style={{ display: "flex", justifyContent: "center", padding: "2px 0" }}>
                  <div style={{ display: "flex", gap: 6 }}>
                    {playerPlayed[currentRound].map(c => <Card key={c.id} card={c} small />)}
                  </div>
                </div>
              )}

              {/* Live hand preview */}
              {isPlay && previewHandEval && (
                <div style={{ display: "flex", justifyContent: "center", padding: "2px 0" }}>
                  <div style={{
                    padding: "3px 14px", borderRadius: 12,
                    background: previewHandEval.isMystery ? "rgba(155,89,182,0.2)" : "rgba(241,196,15,0.12)",
                    border: previewHandEval.isMystery ? "1px solid rgba(155,89,182,0.5)" : "1px solid rgba(241,196,15,0.25)",
                    fontSize: 12, fontWeight: 700,
                    color: previewHandEval.isMystery ? "#bb8fce" : "#f1c40f",
                    letterSpacing: 0.5,
                    animation: previewHandEval.isMystery ? "mysteryPulse 1.5s ease-in-out infinite" : "none",
                  }}>
                    {previewHandEval.name}
                  </div>
                </div>
              )}

            </div>

            {/* Player hand */}
            <div style={{ padding: "6px 0 0", flexShrink: 0, marginBottom: usePixiCards ? 100 : 0 }}>
              {/* DOM fallback for player hand */}
              {!usePixiCards && (
                <div style={{ display: "flex", justifyContent: "center" }}>
                  {playerHand.map((card, i) => (
                    <Card
                      key={card.id} card={card} selected={selected.has(i)}
                      selectable={isDiscard || isPlay} onClick={() => toggleSelect(i)}
                      overlap={i > 0} index={i}
                    />
                  ))}
                </div>
              )}
            </div>

            {/* Buttons — pinned at bottom */}
            <div style={{ display: "flex", justifyContent: "center", gap: 10, padding: "8px 0 6px", flexShrink: 0, pointerEvents: "auto" }}>
              {isDiscard && (
                <button onClick={() => confirmDiscard()} onTouchEnd={(e) => { e.preventDefault(); confirmDiscard(); }} style={btn("#27ae60", "#2ecc71")}>
                  {selected.size === 0 ? "Keep All" : `Discard ${selected.size}`}
                </button>
              )}
              {isPlay && (
                <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap", justifyContent: "center" }}>
                  {ownedMultipliers.size > 0 && !activeMultiplier && (
                    MULTIPLIERS.filter(m => ownedMultipliers.has(m.key)).map(m => (
                      <button key={m.key} onClick={() => setActiveMultiplier(m.key)} onTouchEnd={(e) => { e.preventDefault(); setActiveMultiplier(m.key); }}
                        style={{...btn(m.color, m.color), fontSize: 12, padding: "8px 12px", minHeight: 36}}>
                        {m.label}
                      </button>
                    ))
                  )}
                  {activeMultiplier && (() => {
                    const am = MULTIPLIERS.find(m => m.key === activeMultiplier);
                    return (
                      <button onClick={() => setActiveMultiplier(null)} onTouchEnd={(e) => { e.preventDefault(); setActiveMultiplier(null); }}
                        style={{...btn("#c0392b", "#e74c3c"), fontSize: 12, padding: "8px 12px", minHeight: 36, boxShadow: `0 0 12px ${am.color}88`}}>
                        {am.label} ACTIVE — tap to cancel
                      </button>
                    );
                  })()}
                  <button onClick={() => confirmPlay()} onTouchEnd={(e) => { e.preventDefault(); confirmPlay(); }} disabled={selected.size !== roundInfo.cardsToPlay}
                    style={{
                      ...btn(selected.size === roundInfo.cardsToPlay ? "#2980b9" : "#555", selected.size === roundInfo.cardsToPlay ? "#3498db" : "#666"),
                      opacity: selected.size === roundInfo.cardsToPlay ? 1 : 0.5,
                    }}>
                    Play {roundInfo.cardsToPlay} Cards{activeMultiplier ? ` (${MULTIPLIERS.find(m => m.key === activeMultiplier).label})` : ""}
                  </button>
                </div>
              )}
              {isReveal && (
                <button onClick={() => nextRound()} onTouchEnd={(e) => { e.preventDefault(); nextRound(); }} style={btn("#8e44ad", "#9b59b6")}>
                  {phase === PHASES.R3_REVEAL ? (currentSession < 2 ? "Session Results →" : "See Final Results") : "Next Round →"}
                </button>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error("React Error:", error, info); }
  render() {
    if (this.state.error) {
      return React.createElement("div", { style: { color: "#fff", padding: 20, fontFamily: "monospace", whiteSpace: "pre-wrap" } },
        "ERROR: " + this.state.error.message + "\n\n" + this.state.error.stack);
    }
    return this.props.children;
  }
}

ReactDOM.render(<ErrorBoundary><CommunalPoker /></ErrorBoundary>, document.getElementById("root"));

// iPad/iOS touch optimizations
document.addEventListener('touchmove', function(e) {
  if (!e.target.closest('[data-scrollable]')) {
    e.preventDefault();
  }
}, { passive: false });
document.addEventListener('touchstart', function(){}, { passive: true });
</script>
